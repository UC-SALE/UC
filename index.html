<!DOCTYPE html><html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хямд UC Худалдан авах</title><style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(120deg,#0f0c29,#302b63,#24243e);
    color: #f0f0f0;
}
header {
    text-align: center;
    padding: 25px 15px;
    font-size: 30px;
    font-weight: bold;
    color: #0ff;
    text-shadow: 0 0 10px #0ff,0 0 20px #0ff;
}
.container {
    max-width: 800px;
    margin: 30px auto;
    background: rgba(30,30,50,0.95);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}
h2, h3 { margin-bottom: 15px; color: #0ff; }

.uc-options {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 25px;
}
.uc-options button {
    flex: 1 1 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(45deg,#0ff,#00f);
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
}
.uc-options button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg,#00f,#0ff);
}
.uc-icon {
    width: 28px;
    height: 28px;
    margin-right: 10px;
}

/* бусад CSS хэвээр */

</style></head><body><header>Хямд UC Худалдан авах</header><div class="container"><h2>UC хэмжээг сонгоно уу:</h2><div class="uc-options">
    <button onclick="selectUC(60)">
        <img src="uc-icon.jpg" alt="UC" class="uc-icon">
        60 UC
    </button><button onclick="selectUC(100)">
    <img src="uc-icon.jpg" alt="UC" class="uc-icon">
    100 UC
</button>

<button onclick="selectUC(325)">
    <img src="uc-icon.jpg" alt="UC" class="uc-icon">
    325 UC
</button>

<button onclick="selectUC(660)">
    <img src="uc-icon.jpg" alt="UC" class="uc-icon">
    660 UC
</button>

</div></div><script>
function selectUC(amount) {
    let userId = "user15855";
    document.getElementById("transaction-text").innerText = `${amount} UC (${userId})`;
    alert(amount + " UC сонгогдлоо!");
}
</script></body>
</html>
